<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | Malatang Inventory</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(145deg, #edf4f1 0%, #dbe9e3 100%);
        color: #0f172a;
      }

      .card {
        width: min(92vw, 460px);
        border: 1px solid #cfe5db;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.9);
        padding: 24px;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.4rem;
      }

      p {
        margin: 0;
        color: #475569;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>Malatang is still available for local operations. Reconnect to sync queued records with the API.</p>
    </main>
  </body>
</html>
